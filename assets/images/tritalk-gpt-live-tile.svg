<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 480" role="img" aria-labelledby="title desc">
  <title id="title">TriTalk miniGPT Live</title>
  <desc id="desc">A stylized tile for the hosted TriTalk miniGPT Live project.</desc>
  <defs>
    <linearGradient id="bg-live" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#edf6f5"/>
      <stop offset="55%" stop-color="#fffdf9"/>
      <stop offset="100%" stop-color="#ece9ff"/>
    </linearGradient>
    <linearGradient id="panel-live" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#185b90"/>
      <stop offset="100%" stop-color="#2b9d8f"/>
    </linearGradient>
    <filter id="shadow-live" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#29434b" flood-opacity="0.18"/>
    </filter>
  </defs>

  <rect width="800" height="480" rx="36" fill="url(#bg-live)"/>
  <circle cx="140" cy="110" r="94" fill="#bde7dc" fill-opacity="0.56"/>
  <circle cx="678" cy="364" r="116" fill="#ded8fb" fill-opacity="0.72"/>

  <g filter="url(#shadow-live)">
    <rect x="110" y="132" width="580" height="214" rx="28" fill="#fffdf9" stroke="#d9d4c8"/>
    <rect x="148" y="170" width="150" height="136" rx="22" fill="url(#panel-live)"/>
    <rect x="174" y="198" width="98" height="64" rx="16" fill="#ebfbf7"/>
    <circle cx="202" cy="230" r="9" fill="#2b9d8f"/>
    <circle cx="225" cy="230" r="9" fill="#2b9d8f"/>
    <circle cx="248" cy="230" r="9" fill="#2b9d8f"/>
    <path d="M174 276h98" stroke="#ebfbf7" stroke-width="12" stroke-linecap="round"/>
    <path d="M174 294h66" stroke="#ebfbf7" stroke-width="12" stroke-linecap="round"/>

    <text x="330" y="212" font-family="Arial, sans-serif" font-size="26" letter-spacing="4" fill="#6f675a">HOSTED MODEL</text>
    <text x="330" y="268" font-family="Arial, sans-serif" font-size="54" font-weight="700" fill="#172126">TriTalk miniGPT</text>
    <text x="330" y="314" font-family="Arial, sans-serif" font-size="24" fill="#435157">Live Space-backed generator</text>
  </g>
</svg>
